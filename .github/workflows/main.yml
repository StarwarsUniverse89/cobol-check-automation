name: COBOL Check Automation

on:
  push:
    branches: [ main ]

jobs:
  cobol-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Zowe CLI
        run: npm install @zowe/cli

      - name: Verify tools
        run: |
          java -version
          node -v
          npm -v
          npx zowe --version

      - name: Create Zowe config
        env:
          ZOWE_USERNAME: ${{ secrets.ZOWE_USERNAME }}
          ZOWE_PASSWORD: ${{ secrets.ZOWE_PASSWORD }}
        run: |
          cat > zowe.config.json <<EOF
          {
            "$schema": "./zowe.schema.json",
            "profiles": {
              "zosmf": {
                "type": "zosmf",
                "properties": {
                  "port": 10443
                }
              },
              "project_base": {
                "type": "base",
                "properties": {
                  "host": "204.90.115.200",
                  "user": "${ZOWE_USERNAME}",
                  "password": "${ZOWE_PASSWORD}",
                  "rejectUnauthorized": false
                }
              }
            },
            "defaults": {
              "zosmf": "zosmf",
              "base": "project_base"
            }
          }
          EOF

          cat zowe.config.json

      - name: Setup Mainframe Environment and Upload COBOL Check
        env:
          ZOWE_USERNAME: ${{ secrets.ZOWE_USERNAME }}
          ZOWE_PASSWORD: ${{ secrets.ZOWE_PASSWORD }}
        run: |
          chmod +x .github/scripts/zowe_operations.sh
          .github/scripts/zowe_operations.sh

      - name: Run COBOL Check on Mainframe
        env:
          ZOWE_USERNAME: ${{ secrets.ZOWE_USERNAME }}
          ZOWE_PASSWORD: ${{ secrets.ZOWE_PASSWORD }}
        run: |
          chmod +x .github/scripts/mainframe_operations.sh
          .github/scripts/mainframe_operations.sh